# ── AI model ──────────────────────────────────────────────────────────────────
ai:
  model: gpt-5.4-nano
  send_non_listings: false     # if true, send every post even if AI says it's not a listing

# ── Location ──────────────────────────────────────────────────────────────────
locations:
  preferred:
    - "הוד השרון"
    - "כפר סבא"
    - "רעננה"
    - "נווה ירק"
    - "נווה נאמן"
    - "גני עם"
    - "נווה הדר"
    - 'כפר מל"ל'
    - "נווה ימין"
    - "גני חיים"
    - "גיבעת חן"

# ── Price ─────────────────────────────────────────────────────────────────────
price:
  max: 4500          # posts above this are still forwarded but flagged

# ── Rooms ─────────────────────────────────────────────────────────────────────
rooms:
  min: 1             # posts below this are still forwarded but flagged

# ── Property requirements (null = don't filter on this) ───────────────────────
require:
  balcony: null
  parking: null
  mamad: null
  pets: null
  furnished: null
